<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom-project</title>
</head>
<body>
    <p>
        Youtube Subscribe Button
    </p>
    <button class="js-subscribe-button" onclick="
        subscribe()">
        Subscribe
    </button>

    <p>Amazon Shipping Calculator</p>
    <p>Order under $40 =+ $10 shipping</p>
    <p>Orders over $40 = FREE shipping</p>

    <input type="text" placeholder="Cost of order" class="input-value" onkeydown="
        handleKeyDown(event);
        ">
    <button onclick="
        Calculate();
        " >Calculate</button>

    <P class="js-price"></P>

    <script>
        function handleKeyDown(event){
            if(event.key === 'Enter'){
                Calculate();
            }
        }
        function Calculate(){
            const inputElement = document.querySelector('.input-value');
            let cost = Number(inputElement.value);

            if(cost < 40){
                cost = cost + 10;
            }

            document.querySelector('.js-price')
                .innerHTML = `$${cost}`; 
    
        }
        
        function subscribe(){
            const buttonElement = document.querySelector('.js-subscribe-button');

            if(buttonElement.innerText === 'Subscribe'){
                buttonElement.innerText = 'Subscribed'
            }
            else{
                buttonElement.innerText = 'Subscribe';
            }
        }
    </script>
</body>
</html>
