<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/12-rock-paper-scissors.css">
  </head>
  <body>
    <p class="game-title">Rock Paper Scissors</p>
    <button class="move-button js-rock-button">
      <img src="images/rock-emoji.png" class="move-image">
    </button>

    <button class="move-button js-paper-button">
      <img src="images/paper-emoji.png" class="move-image">
    </button>

    <button class="move-button js-scissors-button">
      <img src="images/scissors-emoji.png" class="move-image">
    </button>
    <p class="js-result result"></p>
    <p class="js-moves moves"></p>
    <p class="js-score score"></p>

    <button class="reset-button" onclick="
      score.win = 0;
      score.lose = 0;
      score.tie = 0;
      localStorage.removeItem('score');
      updateScore();
      ">Reset Score</button>
    <button class="auto-play-button" onclick="
      autoplay();
      ">Auto Play</button>

    <script src="scripts/12-rock-paper-scissor.js"></script>
  </body>
</html>
</body>
</html>
