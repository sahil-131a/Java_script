<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
      body{
        background-color: rgb(25 , 25 , 25);
        color: white;
        font-family: Arial;
      }
      .game-title{
        font-size: 30px;
        font-weight: bold;
      }
      .move-button{
        background-color: rgb(25 , 25 ,25);
        padding: 30px;
        border-color: white;
        border-style: solid;
        border-width: 3px;
        border-radius: 80px;
        margin-right: 8px;
        cursor: pointer;
      }
      .move-image{
        width: 55px;
      }
      .result{
        font-size: 25px;
        font-weight: bold;
        margin-top: 50px;
      }
      .score{
        margin-top: 55px;
      }
      .reset-button{
        border: none;
        background-color: white;
        font-size: 14px;
        padding: 10px 15px 10px 15px;
      }
    </style>
  </head>
  <body>
    <p class="game-title">Rock Paper Scissors</p>
    <button class="move-button" onclick="
      playgame('rock');
    "><img src="images/rock-emoji.png" class="move-image"></button>

    <button class="move-button" onclick="
      playgame('paper');
    "><img src="images/paper-emoji.png" class="move-image"></button>

    <button class="move-button" onclick="
      playgame('scissors');
    "><img src="images/scissors-emoji.png" class="move-image"></button>
    <p class="js-result result"></p>
    <p class="js-moves moves"></p>
    <p class="js-score score"></p>

    <button class="reset-button" onclick="
      score.win = 0;
      score.lose = 0;
      score.tie = 0;
      localStorage.removeItem('score');
      updateScore();
      ">Reset Score</button>


    <script>
      let score = JSON.parse(localStorage.getItem('score')) || {
        win: 0,
        lose:0,
        tie:0
      };

      updateScore();

      
      function playgame(playermove){
        const computerMove = pickComputerMove();
        let result = '';

        if(playermove === 'rock'){
          if (computerMove === 'rock'){
            result = 'Tie.';
          } else if (computerMove === 'paper') {
            result = 'You lose.';
          } else if (computerMove === 'scissors') {
            result = 'You win.';
          }
        } else if(playermove === 'paper'){
            if (computerMove === 'rock') {
            result = 'You win.';
          } else if (computerMove === 'paper') {
            result = 'Tie.';
          } else if (computerMove === 'scissors') {
            result = 'You lose.';
          }
        } else if(playermove === 'scissors'){
          if (computerMove === 'rock') {
            result = 'You lose.';
          } else if (computerMove === 'paper') {
            result = 'You win.';
          } else if (computerMove === 'scissors') {
            result = 'Tie.';
          }
        }
        if(result === 'You win.'){
          score.win += 1;
        }
        else if(result === 'You lose.'){
          score.lose += 1;
        }
        else if(result === 'Tie.'){
          score.tie += 1;
        }

        localStorage.setItem('score' , JSON.stringify(score));
        document.querySelector('.js-result').innerHTML = result;
        document.querySelector('.js-moves').innerHTML = `You <img src="images/${playermove}-emoji.png" class="move-image"> <img src="images/${computerMove}-emoji.png " class="move-image" >Computer`
        updateScore();
      }
      
      function updateScore(){
        document.querySelector('.js-score')
          .innerHTML = `Win: ${score.win}, Lose: ${score.lose}, Tie: ${score.tie}`;
      }
      function pickComputerMove(){
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }
        return computerMove;
      }
    </script>
  </body>
</html>
</body>
</html>
