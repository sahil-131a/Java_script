        // Bracket notation for objects

        const product2 = {
            name: 'shirt',
            ['discounted-price']: 200, 
            'ratings':{
                stars: 4.8,
                count:100
            },
            fun: function f1(){
                console.log('function inside object');
            }   
        };

        console.log(product2['name']);
        console.log(product2['discounted-price']);
        console.log(product2['ratings']['stars']);
        console.log(product2.ratings.count);

        product2.fun();
        const jsonString = JSON.stringify(product2);
        console.log(jsonString);

        console.log(JSON.parse(jsonString));


        // Auto boxing 
        console.log('hello'.length);
        console.log('hello'.toUpperCase());

        const product = {
            name: 'jean',
            price: 1200
        };

        // destructing the object 
        const {name , price} = product;
        console.log(name);
        console.log(price);

        console.log(product);


        const object3 = {
            //name : name
            name,
            /*method: function func(){

            }*/
            method(){
                console.log("method");
            }

        }
