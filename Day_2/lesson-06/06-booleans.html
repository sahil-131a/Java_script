<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booleans</title>
</head>
<body>
    <script>
        console.log(3>4);
        //if - statements 
        if(true){
            console.log("hello");
        }
        else{
            console.log('hyy');
        }

        const age = 17

        if(age>=18){
            console.log('you can drive');
        }
        else if(age>16){
            console.log('Almost eligible to drive')
        }
        else{
            console.log('you can not drive');
        }

        // logical operator 
        console.log(true && true);
        console.log(true && false);
        console.log(0.2 >= 0 && 0.2 <1/3 );

        console.log(true || false);
        console.log(!true);

        //ternary operator
        console.log(true ? 'false': true ) 
    </script> 
</body>
</html>
